services:
  symphony:
    build: .
    env_file: .env
    volumes:
      - ./WORKFLOW.md:/app/WORKFLOW.md:ro
      - workspaces:/app/workspaces
      - state:/app/.symphony
    ports:
      - "9097:9097"
    command: ["--port", "9097", "--state-dir", "/app/.symphony", "--log-format", "json", "--no-tui"]
    restart: unless-stopped
    depends_on:
      - victoriametrics

  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    ports:
      - "8428:8428"
    volumes:
      - vm-data:/storage
      - ./deploy/victoriametrics/scrape.yml:/etc/prometheus/scrape.yml:ro
    command:
      - -promscrape.config=/etc/prometheus/scrape.yml
      - -retentionPeriod=30d
    restart: unless-stopped

  victorialogs:
    image: victoriametrics/victoria-logs:latest
    ports:
      - "9428:9428"
    volumes:
      - vl-data:/vlogs
    command:
      - -storageDataPath=/vlogs
      - -retentionPeriod=30d
    restart: unless-stopped

  vector:
    image: timberio/vector:latest-alpine
    volumes:
      - ./deploy/vector/vector.toml:/etc/vector/vector.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - victorialogs
      - symphony
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3097:3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=victoriametrics-logs-datasource
    restart: unless-stopped
    depends_on:
      - victoriametrics
      - victorialogs

volumes:
  workspaces:
  state:
  vm-data:
  vl-data:
  grafana-data:
