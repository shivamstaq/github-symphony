# Observability stack for Symphony development.
# Symphony runs natively on your machine — this provides metrics + logs + dashboards.
#
# Usage:
#   docker compose up -d
#   symphony WORKFLOW.md    # runs natively, connects to these services
#
# Services:
#   VictoriaMetrics  http://localhost:8428  — scrapes Symphony /metrics
#   VictoriaLogs     http://localhost:9428  — receives log push from Symphony
#   Grafana          http://localhost:3097  — dashboards (admin/admin)

services:
  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    ports:
      - "8428:8428"
    volumes:
      - vm-data:/storage
      - ./deploy/victoriametrics/scrape.yml:/etc/prometheus/scrape.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - -promscrape.config=/etc/prometheus/scrape.yml
      - -retentionPeriod=30d
    restart: unless-stopped

  victorialogs:
    image: victoriametrics/victoria-logs:latest
    ports:
      - "9428:9428"
    volumes:
      - vl-data:/vlogs
    command:
      - -storageDataPath=/vlogs
      - -retentionPeriod=30d
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3097:3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=victoriametrics-logs-datasource
    restart: unless-stopped
    depends_on:
      - victoriametrics
      - victorialogs

volumes:
  vm-data:
  vl-data:
  grafana-data:
